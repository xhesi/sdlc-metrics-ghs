name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  APP_NAME: sdlc-metrics-demo

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit.xml
            coverage/

      - name: Publish Test Results to CloudBees Unify
        uses: cloudbees-io-gha/publish-test-results@v2
        if: always()
        with:
          test-type: junit
          results-path: junit.xml

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  codeql-scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build:
    name: Build and Register Artifact
    runs-on: ubuntu-latest
    needs: [test, lint, codeql-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      id-token: write
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_id: ${{ steps.register-artifact.outputs.cbp_artifact_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate version number
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')
          VERSION="1.0.${COMMIT_COUNT}-${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Build application
        run: |
          npm ci --production
          mkdir -p dist
          cp -r src/ dist/
          cp -r node_modules/ dist/
          cp package.json dist/

      - name: Create artifact package
        run: |
          cd dist
          tar -czf ../${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.tar.gz .
          cd ..
          ls -lh ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}
          path: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 30

      - name: Register Build Artifact in CloudBees Unify
        id: register-artifact
        uses: cloudbees-io-gha/register-build-artifact@v3
        with:
          name: ${{ github.repository }}
          url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          version: ${{ steps.version.outputs.version }}
          type: npm-package

      - name: Add Labels to Artifact
        uses: cloudbees-io-gha/label-artifact-version@v1
        with:
          artifact-id: ${{ steps.register-artifact.outputs.cbp_artifact_id }}
          labels: "${{ github.ref_name }},nodejs,express,automated"

      - name: Publish Build Evidence
        uses: cloudbees-io-gha/publish-evidence-item@v2
        with:
          content: |-
            # Build Evidence Report

            ## Artifact Details
            - **Repository**: ${{ github.repository }}
            - **Version**: ${{ steps.version.outputs.version }}
            - **Artifact ID**: ${{ steps.register-artifact.outputs.cbp_artifact_id }}
            - **Type**: NPM Package
            - **Branch**: ${{ github.ref_name }}

            ## Build Configuration
            - **Node Version**: ${{ env.NODE_VERSION }}
            - **Package**: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.tar.gz
            - **Architecture**: ${{ runner.arch }}
            - **OS**: ${{ runner.os }}

            ## Quality Gates
            - **Unit Tests**: ✅ Passed
            - **Linting**: ✅ Completed
            - **Security Scan**: ✅ CodeQL Analysis Completed

            ## Workflow Summary
            - **Commit**: ${{ github.sha }}
            - **Run Number**: ${{ github.run_number }}
            - **Triggered by**: ${{ github.event_name }}
            - **Actor**: ${{ github.actor }}

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}

      - name: Simulate deployment to dev
        run: |
          echo "Deploying version ${{ needs.build.outputs.version }} to Development environment"
          echo "Artifact: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}.tar.gz"
          ls -lh
          echo "Deployment completed successfully"

      # TODO: Enable when register-deployed-artifact action is released
      # - name: Register Deployed Artifact to Development
      #   uses: cloudbees-io-gha/register-deployed-artifact@latest
      #   with:
      #     artifact-id: ${{ needs.build.outputs.artifact_id }}
      #     target-environment: development
      #     labels: automated-deployment

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}

      - name: Simulate deployment to staging
        run: |
          echo "Deploying version ${{ needs.build.outputs.version }} to Staging environment"
          echo "Artifact: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}.tar.gz"
          ls -lh
          echo "Deployment completed successfully"

      # TODO: Enable when register-deployed-artifact action is released
      # - name: Register Deployed Artifact to Staging
      #   uses: cloudbees-io-gha/register-deployed-artifact@latest
      #   with:
      #     artifact-id: ${{ needs.build.outputs.artifact_id }}
      #     target-environment: staging
      #     labels: automated-deployment

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging environment..."
          echo "All smoke tests passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://prod.example.com
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}

      - name: Simulate deployment to production
        run: |
          echo "Deploying version ${{ needs.build.outputs.version }} to Production environment"
          echo "Artifact: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}.tar.gz"
          ls -lh
          echo "Production deployment completed successfully"

      # TODO: Enable when register-deployed-artifact action is released
      # - name: Register Deployed Artifact to Production
      #   uses: cloudbees-io-gha/register-deployed-artifact@latest
      #   with:
      #     artifact-id: ${{ needs.build.outputs.artifact_id }}
      #     target-environment: production
      #     labels: automated-deployment

      - name: Post-deployment validation
        run: |
          echo "Running post-deployment validation..."
          echo "Validation completed successfully"

      - name: Publish Deployment Evidence
        uses: cloudbees-io-gha/publish-evidence-item@v2
        with:
          content: |-
            # Production Deployment Evidence

            ## Deployment Details
            - **Version**: ${{ needs.build.outputs.version }}
            - **Environment**: Production
            - **Artifact ID**: ${{ needs.build.outputs.artifact_id }}
            - **Deployment Time**: ${{ github.event.head_commit.timestamp }}

            ## Validation
            - **Smoke Tests**: ✅ Passed
            - **Post-deployment Checks**: ✅ Passed

            ## Workflow Info
            - **Run ID**: ${{ github.run_id }}
            - **Deployed by**: ${{ github.actor }}

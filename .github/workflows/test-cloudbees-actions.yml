name: Test CloudBees Actions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish Test Results to CloudBees Unify
        uses: cloudbees-io-gha/publish-test-results@v2
        if: always()
        with:
          test-type: junit
          results-path: junit.xml

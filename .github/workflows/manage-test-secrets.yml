name: Manage Test Secrets File

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - create
          - delete

jobs:
  manage-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env.test file
        if: inputs.action == 'create'
        run: |
          # Base64 encoded fake credentials to avoid Gitleaks detection in workflow file
          CONTENT=$(cat << 'EOF' | base64 -d
IyBUZXN0IGVudmlyb25tZW50IHZhcmlhYmxlcyBmb3Igc2VjdXJpdHkgc2Nhbm5lciB0ZXN0aW5n
CiMgV0FSTklORzogVGhlc2UgYXJlIGZha2UgY3JlZGVudGlhbHMgZm9yIHRlc3RpbmcgcHVycG9z
ZXMgb25seQoKIyBGYWtlIEFXUyBjcmVkZW50aWFscyB0aGF0IGdpdGxlYWtzIHNob3VsZCBkZXRl
Y3QKQVdTX0FDQ0VTU19LRVlfSUQ9QUtJQTJFMEE4RjNCMjQ0Qzk5ODYKQVDTX1NFQ1JFVF9BQ0NF
U1NfS0VZPXh2VFA0QTVYWVoxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAKCiMgRmFrZSBP
cGVuQUkgQVBJIGtleQpPUEVOQUlfQVBJX0tFWT1zay1wcm9qLWFiY2RlZjEyMzQ1Njc4OTAxMjM0
NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTYKCiMgRmFrZSBkYXRhYmFzZSBjb25uZWN0
aW9uIHN0cmluZwpEQVRBQkFTRV9VUkw9cG9zdGdyZXNxbDovL2FkbWluOlN1cGVyU2VjcmV0MTIz
IUBkYi5leGFtcGxlLmNvbTo1NDMyL3Byb2RkYgoKIyBGYWtlIEdpdEh1YiB0b2tlbgpHSVRIVUJf
VE9LRU49Z2hwX2FiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6MTIzNDU2Nzg5MAo=
EOF
)
          echo "$CONTENT" > env.test
          echo "✅ Created env.test file"

      - name: Delete env.test file
        if: inputs.action == 'delete'
        run: |
          if [ -f env.test ]; then
            rm env.test
            echo "✅ Deleted env.test file"
          else
            echo "⚠️  env.test file does not exist"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.action }}" = "create" ]; then
            git add env.test
            git commit -m "$(cat <<'EOF'
          KAN-TEST Add test secrets file for Gitleaks validation

          - Created env.test via automated workflow
          - Contains fake credentials for security scanning testing
          - Triggered by: ${{ github.actor }}

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
          EOF
          )"
          else
            git add env.test
            git commit -m "$(cat <<'EOF'
          KAN-TEST Remove test secrets file

          - Deleted env.test via automated workflow
          - Triggered by: ${{ github.actor }}

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
          EOF
          )"
          fi

          git push

      - name: Summary
        run: |
          echo "### Manage Test Secrets Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action**: ${{ inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

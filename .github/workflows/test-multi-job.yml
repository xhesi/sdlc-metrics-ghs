name: Test Multi Job

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Job 1"

  job2:
    runs-on: ubuntu-latest
    needs: [job1]
    steps:
      - uses: actions/checkout@v4
      - run: echo "Job 2"
